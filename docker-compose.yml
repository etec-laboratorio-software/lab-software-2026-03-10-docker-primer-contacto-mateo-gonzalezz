services:
  backend:
    build: ./backend
    container_name: backend
    volumes:
      - ./backend:/app/backend
      - db_data:/app/data
    environment:
      - SECRET_KEY=clave-super-secreta-cambiar-esto-en-produccion-1234
    restart: always

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: always

volumes:
  db_data:
